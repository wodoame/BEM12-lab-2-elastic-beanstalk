name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main  # Triggers on every push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6

      # ── 2. Set up Java (adjust version to match your project) ────────
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # ── 3. Cache Maven dependencies ──────────────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # ── 4. Build the JAR ─────────────────────────────────────────────
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ── 5. Create a unique version label ─────────────────────────────
      - name: Generate version label
        id: version
        run: echo "label=v-${{ github.run_number }}-${{ github.sha }}" >> $GITHUB_OUTPUT

      # ── 6. Package into a ZIP (source bundle) ────────────────────────
      - name: Create deployment ZIP
        run: |
          zip -r deploy-${{ steps.version.outputs.label }}.zip \
            target/*.jar \
            Procfile \
            .ebextensions/   # include if you have EB config files

      # ── 7. Configure AWS credentials ─────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 8. Upload ZIP to S3 ──────────────────────────────────────────
      - name: Upload bundle to S3
        run: |
          aws s3 cp deploy-${{ steps.version.outputs.label }}.zip \
            s3://${{ secrets.S3_BUCKET }}/deploys/deploy-${{ steps.version.outputs.label }}.zip

      # ── 9. Create a new EB application version ───────────────────────
      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --version-label ${{ steps.version.outputs.label }} \
            --source-bundle S3Bucket=${{ secrets.S3_BUCKET }},S3Key=deploys/deploy-${{ steps.version.outputs.label }}.zip \
            --no-auto-create-application

      # ── 10. Deploy to Elastic Beanstalk environment ──────────────────
      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-name ${{ secrets.EB_ENV_NAME }} \
            --version-label ${{ steps.version.outputs.label }}

      # ── 11. Wait for deployment to complete ──────────────────────────
      - name: Wait for environment to be ready
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-names ${{ secrets.EB_ENV_NAME }}

      - name: Deployment complete
        run: echo "✅ Deployed version ${{ steps.version.outputs.label }} successfully!"