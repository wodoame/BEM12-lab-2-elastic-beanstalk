name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main  # Triggers on every push to main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      SSM_PARAMETER_PREFIX: /elasticbeanstalk/lab

    steps:
      # ── 1. Checkout source code ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v6

      # ── 2. Set up Java (adjust version to match your project) ────────
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # ── 3. Cache Maven dependencies ──────────────────────────────────
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # ── 4. Build the JAR ─────────────────────────────────────────────
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ── 5. Create a unique version label ─────────────────────────────
      - name: Generate version label
        run: echo "VERSION_LABEL=v-${{ github.run_number }}-${{ github.run_attempt }}-${{ github.sha }}" >> $GITHUB_ENV

      # ── 6. Package into a ZIP (source bundle) ────────────────────────
      - name: Create deployment ZIP
        run: |
          jar_file=$(find target -maxdepth 1 -name "*.jar" ! -name "*.original" -print -quit)
          cp "$jar_file" application.jar
          zip -r deploy-$VERSION_LABEL.zip \
            application.jar \
            Procfile
          if [ -d .ebextensions ]; then
            zip -r deploy-$VERSION_LABEL.zip .ebextensions/
          fi

      # ── 7. Configure AWS credentials ─────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 8. Load deployment settings from SSM Parameter Store ─────────
      - name: Load deployment parameters from SSM
        run: |
          echo "EB_APP_NAME=$(aws ssm get-parameter --name "$SSM_PARAMETER_PREFIX/eb-app-name" --query 'Parameter.Value' --output text)" >> $GITHUB_ENV
          echo "EB_ENV_NAME=$(aws ssm get-parameter --name "$SSM_PARAMETER_PREFIX/eb-env-name" --query 'Parameter.Value' --output text)" >> $GITHUB_ENV
          echo "S3_BUCKET=$(aws ssm get-parameter --name "$SSM_PARAMETER_PREFIX/s3-bucket" --query 'Parameter.Value' --output text)" >> $GITHUB_ENV

      # ── 9. Upload ZIP to S3 ──────────────────────────────────────────
      - name: Upload bundle to S3
        run: |
          aws s3 cp deploy-$VERSION_LABEL.zip \
            s3://$S3_BUCKET/deploy-$VERSION_LABEL.zip

      # ── 10. Create a new EB application version ──────────────────────
      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APP_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket="$S3_BUCKET",S3Key=deploy-$VERSION_LABEL.zip \
            --no-auto-create-application

      # ── 11. Deploy to Elastic Beanstalk environment ──────────────────
      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "$EB_APP_NAME" \
            --environment-name "$EB_ENV_NAME" \
            --version-label "$VERSION_LABEL"

      # ── 12. Wait for deployment to complete ──────────────────────────
      - name: Wait for environment to be ready
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name "$EB_APP_NAME" \
            --environment-names "$EB_ENV_NAME"

      - name: Deployment complete
        run: echo "✅ Deployed version $VERSION_LABEL successfully!"
